server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    # Proxy /stats/stream to the monitor running on the host
    location /stats/stream {
        proxy_pass http://172.18.0.1:5008/stream;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
    }

    # Serve static files
    location / {
        try_files $uri $uri/ $uri.html =404;
    }
}
