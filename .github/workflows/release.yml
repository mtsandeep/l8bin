name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cross-compile toolchain
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Add targets
        run: rustup target add aarch64-unknown-linux-gnu aarch64-apple-darwin x86_64-apple-darwin

      # ── CLI ──────────────────────────────────────────────
      - name: Build CLI (linux x86_64)
        run: cargo build --release -p l8b --target x86_64-unknown-linux-gnu

      - name: Build CLI (linux aarch64)
        run: cargo build --release -p l8b --target aarch64-unknown-linux-gnu

      - name: Build CLI (windows x86_64)
        run: cargo build --release -p l8b --target x86_64-pc-windows-msvc

      - name: Build CLI (macOS x86_64)
        run: cargo build --release -p l8b --target x86_64-apple-darwin

      - name: Build CLI (macOS aarch64)
        run: cargo build --release -p l8b --target aarch64-apple-darwin

      # ── Orchestrator ────────────────────────────────────
      - name: Build Orchestrator (linux x86_64)
        run: cargo build --release -p litebin-orchestrator --target x86_64-unknown-linux-gnu

      - name: Build Orchestrator (linux aarch64)
        run: cargo build --release -p litebin-orchestrator --target aarch64-unknown-linux-gnu

      # ── Agent ───────────────────────────────────────────
      - name: Build Agent (linux x86_64)
        run: cargo build --release --bin litebin-agent --target x86_64-unknown-linux-gnu

      - name: Build Agent (linux aarch64)
        run: cargo build --release --bin litebin-agent --target aarch64-unknown-linux-gnu

      # ── Dashboard ───────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Build Dashboard
        run: |
          npm install -g pnpm
          cd dashboard
          pnpm install --frozen-lockfile
          pnpm build
          tar -czf ../l8b-dashboard.tar.gz dist/
          cd ../dashboard && zip -r ../l8b-dashboard.zip dist/

      # ── Package ─────────────────────────────────────────
      - name: Rename binaries
        working-directory: target
        run: |
          # CLI
          cp x86_64-unknown-linux-gnu/release/l8b l8b-x86_64-linux
          cp aarch64-unknown-linux-gnu/release/l8b l8b-aarch64-linux
          cp x86_64-pc-windows-msvc/release/l8b.exe l8b-x86_64-windows.exe
          cp x86_64-apple-darwin/release/l8b l8b-x86_64-macos
          cp aarch64-apple-darwin/release/l8b l8b-aarch64-macos
          # Orchestrator
          cp x86_64-unknown-linux-gnu/release/litebin-orchestrator litebin-orchestrator-x86_64-linux
          cp aarch64-unknown-linux-gnu/release/litebin-orchestrator litebin-orchestrator-aarch64-linux
          # Agent
          cp x86_64-unknown-linux-gnu/release/litebin-agent litebin-agent-x86_64-linux
          cp aarch64-unknown-linux-gnu/release/litebin-agent litebin-agent-aarch64-linux

      - name: Generate checksums
        working-directory: target
        run: |
          sha256sum l8b-x86_64-linux > ../checksums.txt
          sha256sum l8b-aarch64-linux >> ../checksums.txt
          sha256sum l8b-x86_64-windows.exe >> ../checksums.txt
          sha256sum l8b-x86_64-macos >> ../checksums.txt
          sha256sum l8b-aarch64-macos >> ../checksums.txt
          sha256sum litebin-orchestrator-x86_64-linux >> ../checksums.txt
          sha256sum litebin-orchestrator-aarch64-linux >> ../checksums.txt
          sha256sum litebin-agent-x86_64-linux >> ../checksums.txt
          sha256sum litebin-agent-aarch64-linux >> ../checksums.txt
          cd .. && sha256sum l8b-dashboard.tar.gz >> checksums.txt
          sha256sum l8b-dashboard.zip >> checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/l8b-x86_64-linux
            target/l8b-aarch64-linux
            target/l8b-x86_64-windows.exe
            target/l8b-x86_64-macos
            target/l8b-aarch64-macos
            target/litebin-orchestrator-x86_64-linux
            target/litebin-orchestrator-aarch64-linux
            target/litebin-agent-x86_64-linux
            target/litebin-agent-aarch64-linux
            l8b-dashboard.tar.gz
            l8b-dashboard.zip
            checksums.txt
          generate_release_notes: true
