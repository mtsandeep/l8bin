name: Deploy Landing Page

on:
  workflow_dispatch:

concurrency:
  group: deploy-landing-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download latest release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download --pattern 'openapi.json' --output docs/openapi.json --clobber
          gh release download --pattern 'cli-reference.md' --output docs/cli-reference.md --clobber
          gh release download --pattern 'llms-full.txt' --output llms-full.txt --clobber

      - name: Copy docs into landing
        run: |
          mkdir -p landing/public/docs/guides
          cp docs/openapi.json landing/public/docs/openapi.json
          cp docs/cli-reference.md landing/public/docs/guides/cli-reference.md
          cp llms-full.txt landing/public/llms-full.txt
          for f in multi-service multi-server volumes env-secrets configuration local-testing security faq architecture decisions failure-model janitor user-flows waker; do
            if [ -f "docs/${f}.md" ]; then
              cp "docs/${f}.md" "landing/public/docs/guides/${f}.md"
            fi
          done

      - uses: mtsandeep/l8bin-action@v1
        with:
          server: ${{ secrets.L8B_SERVER }}
          token: ${{ secrets.L8B_TOKEN }}
          project_id: landing
          port: '80'
          path: landing
